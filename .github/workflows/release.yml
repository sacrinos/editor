name: Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - core
          - viewer
          - editor
          - both
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: "Dry run (no publish)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump & publish core
        if: inputs.package == 'core' || inputs.package == 'both'
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          BUMP=${{ inputs.bump }}
          VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
          if [ "$BUMP" = "major" ]; then MAJ=$((MAJ+1)); MIN=0; PAT=0; fi
          if [ "$BUMP" = "minor" ]; then MIN=$((MIN+1)); PAT=0; fi
          if [ "$BUMP" = "patch" ]; then PAT=$((PAT+1)); fi
          VERSION="$MAJ.$MIN.$PAT"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "CORE_VERSION=$VERSION" >> $GITHUB_ENV

          bun run build

          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "🏜️ Dry run — would publish @sacrinos/core@$VERSION"
            npm publish --dry-run --access public
          else
            npm publish --access public
            echo "📦 Published @sacrinos/core@$VERSION"
          fi

      - name: Bump & publish viewer
        if: inputs.package == 'viewer' || inputs.package == 'both'
        working-directory: packages/viewer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          BUMP=${{ inputs.bump }}
          VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
          if [ "$BUMP" = "major" ]; then MAJ=$((MAJ+1)); MIN=0; PAT=0; fi
          if [ "$BUMP" = "minor" ]; then MIN=$((MIN+1)); PAT=0; fi
          if [ "$BUMP" = "patch" ]; then PAT=$((PAT+1)); fi
          VERSION="$MAJ.$MIN.$PAT"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "VIEWER_VERSION=$VERSION" >> $GITHUB_ENV

          bun run build

          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "🏜️ Dry run — would publish @sacrinos/viewer@$VERSION"
            npm publish --dry-run --access public
          else
            npm publish --access public
            echo "📦 Published @sacrinos/viewer@$VERSION"
          fi

      - name: Bump & publish editor
        if: inputs.package == 'editor'
        working-directory: packages/editor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          BUMP=${{ inputs.bump }}
          VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
          if [ "$BUMP" = "major" ]; then MAJ=$((MAJ+1)); MIN=0; PAT=0; fi
          if [ "$BUMP" = "minor" ]; then MIN=$((MIN+1)); PAT=0; fi
          if [ "$BUMP" = "patch" ]; then PAT=$((PAT+1)); fi
          VERSION="$MAJ.$MIN.$PAT"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "EDITOR_VERSION=$VERSION" >> $GITHUB_ENV

          bun run build

          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "🏜️ Dry run — would publish @sacrinos/editor@$VERSION"
            npm publish --dry-run --access public
          else
            npm publish --access public
            echo "📦 Published @sacrinos/editor@$VERSION"
          fi

      - name: Commit version bumps & tag
        if: inputs.dry-run == false
        run: |
          git add -A
          PKGS=""
          TAGS=""

          if [ -n "$CORE_VERSION" ]; then
            PKGS="$PKGS @sacrinos/core@$CORE_VERSION"
            TAGS="$TAGS @sacrinos/core@$CORE_VERSION"
          fi
          if [ -n "$VIEWER_VERSION" ]; then
            PKGS="$PKGS @sacrinos/viewer@$VIEWER_VERSION"
            TAGS="$TAGS @sacrinos/viewer@$VIEWER_VERSION"
          fi
          if [ -n "$EDITOR_VERSION" ]; then
            PKGS="$PKGS @sacrinos/editor@$EDITOR_VERSION"
            TAGS="$TAGS @sacrinos/editor@$EDITOR_VERSION"
          fi

          git commit -m "release:${PKGS}"

          for TAG in $TAGS; do
            git tag "$TAG"
          done

          git push --follow-tags
